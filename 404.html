<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | OSBP</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Simple style to center the 404 content */
        .not-found-content {
            text-align: center;
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
    </style>
</head>
<body>

    <header id="header-placeholder"></header>

    <main class="container page-content">
        <div class="not-found-content">
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>Looks like you've strayed from the cultivated path! The page you're looking for might have been moved or doesn't exist.</p>
            <a href="/index.html" class="cta-button">Return to Homepage</a>
        </div>
    </main>

    <footer id="footer-placeholder"></footer>

    <script src="/script.js"></script>
    <script>
        navSlide();
    </script>
</body>
</html>
